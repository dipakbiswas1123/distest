const questions=[];

// 100 প্রশ্ন generate
for(let i=0;i<100;i++){
    let b = base[i % base.length];

    let shuffled = shuffle([...b.options]);

    questions.push({
        q:(i+1)+". "+b.q,
        options:shuffled,
        answer:shuffled.indexOf(b.options[b.answer])
    });
}

let current=0,score=0,selected=null;
let timeLeft=3000;
let timerInterval;
let userName="";

function startExam(){
    userName=document.getElementById("username").value;

    if(userName.trim()===""){
        alert("Name likhun!");
        return;
    }

    document.getElementById("startScreen").style.display="none";
    document.getElementById("quiz").style.display="block";

    startTimer();
    loadQuestion();
}

function startTimer(){
    timerInterval=setInterval(()=>{
        let min=Math.floor(timeLeft/60);
        let sec=timeLeft%60;

        document.getElementById("timer").innerText=`Time Left: ${min}:${sec<10?'0'+sec:sec}`;
        timeLeft--;

        if(timeLeft<0){
            clearInterval(timerInterval);
            showResult();
        }
    },1000);
}

function loadQuestion(){
    selected=null;
    let q=questions[current];

    document.getElementById("progress").innerText=`Question ${current+1} of 100`;
    document.getElementById("question").innerText=q.q;

    let optDiv=document.getElementById("options");
    optDiv.innerHTML="";

    const labels=['A','B','C','D'];

    q.options.forEach((opt,i)=>{
        let div=document.createElement("div");
        div.className="option";
        div.innerText=`${labels[i]}. ${opt}`;

        div.onclick=()=>{
            document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
            div.classList.add('selected');
            selected=i;
        }

        optDiv.appendChild(div);
    });
}

function nextQuestion(){
    if(selected===null){
        alert("Please Select Answer");
        return;
    }

    if(selected===questions[current].answer) score++;

    current++;

    if(current<questions.length) loadQuestion();
    else showResult();
}

function generateCertID(){
    return "DIS-" + Math.floor(Math.random()*1000000);
}

function showResult(){
    clearInterval(timerInterval);

    document.getElementById("quiz").style.display="none";
    let res=document.getElementById("result");
    res.style.display="block";

    let pass=score>=70;
    let certHTML="";

    if(pass){
        let certID=generateCertID();
        let date=new Date().toLocaleDateString();

        certHTML=`
        <div id="certificate">
            <div class="cert-title">🎓 Certificate of Achievement</div>
            <p>This is to certify that</p>
            <div class="cert-name">${userName}</div>
            <p>has successfully passed as</p>
            <p><b>Support Engineer</b></p>

            <p>Score: <b>${score}/100</b></p>
            <p>Date: ${date}</p>

            <div class="cert-id">Certificate ID: ${certID}</div>
            <p>Managing Director: MD Amdad Hossain Rana</p>
            <p><b>Discovery Internet</b></p>
        </div>

        <button onclick="downloadPDF()">📄 Download Certificate</button>
        `;
    }

    res.innerHTML=`
    <h2>Exam Finished</h2>
    <p>Score: ${score}/100</p>
    <p>${pass?"✅ PASS":"❌ FAIL"}</p>
    ${certHTML}
    `;
}

function downloadPDF(){
    const element = document.getElementById("certificate");

    const opt = {
        margin: 0,
        filename: 'certificate.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'px', format: 'a4', orientation: 'landscape' },
        pagebreak: { mode: ['avoid-all'] }
    };

    html2pdf().set(opt).from(element).save();
}

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}
