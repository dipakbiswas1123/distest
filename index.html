    background: linear-gradient(135deg,#f4f5f7,#e9e7eb);

    justify-content:center;
    align-items:center;
    height:100vh;

   #certificate {
    width: 900px;
    height: 600px;
    padding: 50px;
    box-sizing: border-box;

    text-align: center;
    border: 10px solid rgb(152, 172, 177);
    border-radius: 20px;
    background: rgb(152, 172, 177);

    display: flex;
    flex-direction: column;
    justify-content: center;
}
}

.cert-title{

}

.cert-name{
    font-size:26px;

    color:#333;
    margin:20px 0;
}

.cert-id{
    margin-top:20px;

}



#app {
    background:white;
    width:520px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.option{background:#f1f1f1;padding:12px;margin:8px 0;border-radius:8px;cursor:pointer;}
.option:hover{background:#dfe6ff;}
.selected{background:#c7d2fe !important;}

button{width:100%;padding:12px;border:none;background:#667eea;color:white;border-radius:8px;cursor:pointer;margin-top:10px;}

const questions=[];

// FIXED PART 🔥
for(let i=0;i<100;i++){
    let b=base[i%base.length];

    let wrong=shuffle(distractors.filter(x=>x!==b.a)).slice(0,3);

    let opts=shuffle([b.a,...wrong]);

    questions.push({
        q:(i+1)+". "+b.q,
        options:opts,
        answer:opts.indexOf(b.a)
    });
}

let current=0,score=0,selected=null;
let timeLeft=3000;
let timerInterval;
let userName="";

function startExam(){
    userName=document.getElementById("username").value;
    if(userName.trim()===""){
        alert("Name likhun!");
        return;
    }

    document.getElementById("startScreen").style.display="none";
    document.getElementById("quiz").style.display="block";

    startTimer();
    loadQuestion();
}

function startTimer(){
    timerInterval=setInterval(()=>{
        let min=Math.floor(timeLeft/60);
        let sec=timeLeft%60;

        document.getElementById("timer").innerText=`Time Left: ${min}:${sec<10?'0'+sec:sec}`;

        timeLeft--;

        if(timeLeft<0){
            clearInterval(timerInterval);
            showResult();
        }
    },1000);
}

function loadQuestion(){
    selected=null;
    let q=questions[current];

    document.getElementById("progress").innerText=`Question ${current+1} of 100`;
    document.getElementById("question").innerText=q.q;

    let optDiv=document.getElementById("options");
    optDiv.innerHTML="";

    const labels=['A','B','C','D'];

    q.options.forEach((opt,i)=>{
        let div=document.createElement("div");
        div.className="option";
        div.innerText=`${labels[i]}. ${opt}`;

        div.onclick=()=>{
            document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
            div.classList.add('selected');
            selected=i;
        }

        optDiv.appendChild(div);
    });
}

function nextQuestion(){
    if(selected===null){
        alert("Please Select Answer");
        return;
    }

    if(selected===questions[current].answer) score++;

    current++;

    if(current<questions.length) loadQuestion();
    else showResult();
}

function generateCertID(){
    return "DIS-" + Math.floor(Math.random()*1000000);
}

function showResult(){
    clearInterval(timerInterval);

    document.getElementById("quiz").style.display="none";
    let res=document.getElementById("result");
    res.style.display="block";

    let pass=score>=70;
    let certHTML="";

    if(pass){
        let certID=generateCertID();
        let date=new Date().toLocaleDateString();

        certHTML=`
        <div id="certificate">
            <div class="cert-title">🎓 Certificate of Achievement</div>
            <p>This is to certify that</p>
            <div class="cert-name">${userName}</div>
            <p>has successfully passed as</p>
            <p><b>Support Engineer</b></p>

            <p>Score: <b>${score}/100</b></p>
            <p>Date: ${date}</p>

            <div class="cert-id">Certificate ID: ${certID}</div>
            <p>Managing Director: MD Amdad Hossain Rana</p>
            <p><b>Discovery Internet</b></p>
        </div>

        <button onclick="downloadPDF()">📄 Download Certificate</button>
        `;
    }

    res.innerHTML=`
    <h2>Exam Finished</h2>
    <p>Score: ${score}/100</p>
    <p>${pass?"✅ PASS":"❌ FAIL"}</p>
    ${certHTML}
    `;
}

function downloadPDF(){
    const element = document.getElementById("certificate");

    const opt = {
        margin:       0,
        filename:     'certificate.pdf',
        image:        { type: 'jpeg', quality: 1 },
        html2canvas:  { scale: 3, useCORS: true },
        jsPDF:        { unit: 'px', format: [900, 600], orientation: 'landscape' }
    };

    html2pdf().set(opt).from(element).save();
}

function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
